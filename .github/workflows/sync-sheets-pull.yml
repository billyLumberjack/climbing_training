name: Pull Session Logs from Sheets

on:
  workflow_dispatch:  # Manual trigger: click "Run workflow" after logging sessions

permissions:
  contents: write  # Allow pushing commits to the repository

jobs:
  pull-from-sheets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Write credentials
        env:
          CREDS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDS }}
        run: |
          echo "$CREDS_JSON" > /tmp/creds.json
          echo "✅ Credentials written to /tmp/creds.json"

      - name: Pull session logs from Google Sheets
        env:
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SHEETS_CREDS_PATH: /tmp/creds.json
        run: npx tsx scripts/sync-sheets-to-git.ts --pull

      - name: Push committed changes
        run: |
          git config user.name "Climbing Training Sync"
          git config user.email "sync@training.local"
          git push https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main || echo "ℹ️ No changes to push"

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/creds.json
